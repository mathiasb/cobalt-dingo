name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE: cobalt-dingo

jobs:
  # ── 1. Quality gate ─────────────────────────────────────────────────────────
  check:
    name: Lint / Test / Vet
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false   # self-hosted runner: Go cache persists on disk between runs

      # Verify pre-installed toolchain on koala runner.
      # Fail fast here rather than silently mid-run.
      - name: Verify toolchain
        run: |
          go version
          task --version
          govulncheck -version 2>&1 || true

      - name: Install golangci-lint
        run: |
          # Pin to v2 to match the config format used in this repo.
          # Overrides whatever version is pre-installed on the runner.
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4
          golangci-lint --version

      - name: Run checks
        run: task check

  # ── 2. Build image ──────────────────────────────────────────────────────────
  build:
    name: Build & Import
    needs: check
    runs-on: self-hosted
    # Only on main branch or semver tags — not on PRs.
    if: github.event_name != 'pull_request'
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive image tags
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "sha-tag=${SHA}" >> "$GITHUB_OUTPUT"
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            echo "version-tag=${REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push to local registry
        run: |
          REGISTRY="localhost:5000"
          REF="${REGISTRY}/${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }}"
          buildah build \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
            -t ${REF} \
            -t ${REGISTRY}/${{ env.IMAGE }}:latest \
            .
          buildah push --tls-verify=false ${REF}
          buildah push --tls-verify=false ${REGISTRY}/${{ env.IMAGE }}:latest
          # Tag semver if this is a release
          [[ -n "${{ steps.meta.outputs.version-tag }}" ]] && \
            buildah push --tls-verify=false \
              ${REF} \
              ${REGISTRY}/${{ env.IMAGE }}:${{ steps.meta.outputs.version-tag }} || true
          echo "✓ Image pushed to ${REF}"

      # Smoke test: pull from registry and run the binary briefly.
      - name: Smoke test
        run: |
          REGISTRY="localhost:5000"
          REF="${REGISTRY}/${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }}"
          CNAME="smoke-${{ steps.meta.outputs.sha-tag }}"
          sudo k3s ctr images pull --plain-http ${REF}
          # Run with a 5s timeout; binary is a long-running server so timeout is expected.
          OUTPUT=$(timeout 5 sudo k3s ctr run --rm ${REF} ${CNAME} /cobalt-dingo 2>&1 || true)
          sudo k3s ctr containers delete ${CNAME} 2>/dev/null || true
          echo "$OUTPUT" | grep -q "cobalt-dingo" \
            && echo "✓ Smoke test passed" \
            || echo "⚠ Smoke test inconclusive: $OUTPUT"

  # ── 3. Deploy via infra repo + Flux ─────────────────────────────────────────
  deploy:
    name: Deploy via GitOps
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Update image tag in infra repo
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          DEPLOY_KEY: ${{ secrets.INFRA_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          # SSH key for write access to gitea.d-ma.be/mathias/infra.
          # INFRA_DEPLOY_KEY is a Gitea org secret (mathias org), already
          # configured per docs/cd-pipeline.md in the infra repo.
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_infra
          chmod 600 ~/.ssh/id_infra
          ssh-keyscan -p 30022 10.0.1.20 >> ~/.ssh/known_hosts 2>/dev/null

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_infra -o IdentitiesOnly=yes"
          rm -rf /tmp/infra
          git clone -b main ssh://git@10.0.1.20:30022/mathias/infra.git /tmp/infra
          cd /tmp/infra

          DEPLOYMENT="k3s/apps/cobalt-dingo/deployment.yaml"
          # In-place update of the image tag. Use sed (not yq) so we don't
          # depend on additional tooling on the runner.
          sed -i "s|image: localhost:5000/cobalt-dingo:.*|image: localhost:5000/cobalt-dingo:${IMAGE_TAG}|" "$DEPLOYMENT"

          # Verify the patch took effect.
          grep -q "localhost:5000/cobalt-dingo:${IMAGE_TAG}" "$DEPLOYMENT" \
            || { echo "✗ image tag patch failed"; exit 1; }

          if git diff --quiet "$DEPLOYMENT"; then
            echo "ℹ image tag unchanged — skipping push"
          else
            git -c user.name="cobalt-dingo CI" \
                -c user.email="ci@cobalt-dingo.local" \
                commit -m "chore(deploy): cobalt-dingo → ${IMAGE_TAG}" "$DEPLOYMENT"
            git push origin main
            echo "✓ pushed to infra repo"
          fi

          shred -u ~/.ssh/id_infra

      - name: Trigger Flux reconcile (immediate)
        run: |
          # Without these annotations, Flux would still pick up the change
          # within 30s (the apps Kustomization interval). The annotations
          # cut latency to ~1s.
          kubectl -n flux-system annotate gitrepository flux-system \
            reconcile.fluxcd.io/requestedAt="$(date +%s)" --overwrite
          kubectl -n flux-system annotate kustomization apps \
            reconcile.fluxcd.io/requestedAt="$(date +%s)" --overwrite

      - name: Wait for Flux to apply new image
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          # Poll the Deployment spec until it reflects the new tag.
          # Bound to 60s so a stuck Flux doesn't hang CI.
          EXPECTED="localhost:5000/cobalt-dingo:${IMAGE_TAG}"
          for i in $(seq 1 60); do
            CURRENT=$(kubectl get deploy cobalt-dingo -n cobalt-dingo \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
            if [ "$CURRENT" = "$EXPECTED" ]; then
              echo "✓ Flux applied new image after ${i}s"
              break
            fi
            sleep 1
          done
          # Final assertion (in case the loop exited without matching).
          kubectl get deploy cobalt-dingo -n cobalt-dingo \
            -o jsonpath='{.spec.template.spec.containers[0].image}' \
            | grep -qx "$EXPECTED" \
            || { echo "✗ Flux did not apply new image within 60s"; exit 1; }

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/cobalt-dingo \
            --namespace cobalt-dingo \
            --timeout=120s \
          || {
            echo "── pod status ──"
            kubectl get pods -n cobalt-dingo -o wide
            echo "── events ──"
            kubectl get events -n cobalt-dingo --sort-by='.lastTimestamp' | tail -20
            echo "── describe ──"
            kubectl describe pods -n cobalt-dingo -l app=cobalt-dingo | tail -40
            exit 1
          }

      - name: Confirm pod running new image
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          kubectl get pods -n cobalt-dingo \
            -l app=cobalt-dingo \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[*].spec.containers[0].image}' \
          | grep -q "localhost:5000/cobalt-dingo:${IMAGE_TAG}" \
          && echo "✓ pod running new image" \
          || { echo "✗ pod image mismatch"; exit 1; }

  # ── 4. E2E sandbox tests ─────────────────────────────────────────────────────
  e2e:
    name: E2E (Fortnox sandbox)
    needs: check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      # Write credentials from secrets — never stored in the repo.
      # act_runner substitutes ${{ }} before passing the script to bash.
      - name: Write credentials
        run: |
          echo 'FORTNOX_CLIENT_ID=${{ secrets.FORTNOX_CLIENT_ID }}'     > .env
          echo 'FORTNOX_CLIENT_SECRET=${{ secrets.FORTNOX_CLIENT_SECRET }}' >> .env
          echo 'FORTNOX_REDIRECT_URI=http://localhost:8080/callback'         >> .env
          echo 'FORTNOX_SCOPES="companyinformation bookkeeping customer invoice supplier supplierinvoice payment currency project costcenter assets settings"' >> .env
          echo 'FORTNOX_ENV=sandbox'                                          >> .env
          echo 'FORTNOX_INVOICE_INBOX=${{ secrets.FORTNOX_INVOICE_INBOX }}'  >> .env
          python3 -c "import json; open('.fortnox-tokens.json','w').write(json.dumps({'access_token':'','refresh_token':'${{ secrets.FORTNOX_REFRESH_TOKEN }}','token_type':'bearer','expires_at':'2000-01-01T00:00:00Z'}))"
          chmod 600 .fortnox-tokens.json
          echo ".env lines: $(wc -l < .env)  token bytes: $(wc -c < .fortnox-tokens.json)"
          cat .fortnox-tokens.json

      # Reset sandbox to a known state before seeding.
      - name: Teardown E2E fixtures
        run: |
          set -a && source .env && set +a
          go run ./cmd/e2e-teardown

      # Seed test suppliers and booked invoices.
      - name: Seed E2E fixtures
        run: |
          set -a && source .env && set +a
          go run ./cmd/e2e-seed

      # Run acceptance tests against the seeded sandbox.
      # Data is intentionally left in place after the run for manual inspection.
      - name: Run acceptance tests
        run: |
          set -a && source .env && set +a
          go test -race -count=1 -timeout=120s ./internal/acceptance/...

  # ── 5. Mirror to GitHub ─────────────────────────────────────────────────────
  mirror:
    name: Mirror to GitHub
    needs: [deploy, e2e]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitHub
        env:
          GH_DEPLOY_KEY: ${{ secrets.GH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$GH_DEPLOY_KEY" > ~/.ssh/id_rsa_gh_mirror
          chmod 600 ~/.ssh/id_rsa_gh_mirror
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_rsa_gh_mirror -o IdentitiesOnly=yes" \
            git push git@github.com:mathiasb/cobalt-dingo.git HEAD:main
          rm ~/.ssh/id_rsa_gh_mirror
          echo "✓ Mirrored to GitHub"
