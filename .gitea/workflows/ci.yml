name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE: cobalt-dingo

jobs:
  # ── 1. Quality gate ─────────────────────────────────────────────────────────
  check:
    name: Lint / Test / Vet
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Verify pre-installed toolchain on koala runner.
      # Fail fast here rather than silently mid-run.
      - name: Verify toolchain
        run: |
          go version
          task --version
          golangci-lint --version
          govulncheck -version 2>&1 || true

      - name: Run checks
        run: task check

  # ── 2. Build image ──────────────────────────────────────────────────────────
  build:
    name: Build & Import
    needs: check
    runs-on: self-hosted
    # Only on main branch or semver tags — not on PRs.
    if: github.event_name != 'pull_request'
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive image tags
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "sha-tag=${SHA}" >> "$GITHUB_OUTPUT"
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            echo "version-tag=${REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image with buildah
        run: |
          buildah build \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
            -t ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }} \
            -t ${{ env.IMAGE }}:latest \
            .
          # Tag semver if this is a release
          [[ -n "${{ steps.meta.outputs.version-tag }}" ]] && \
            buildah tag \
              ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }} \
              ${{ env.IMAGE }}:${{ steps.meta.outputs.version-tag }} || true

      # Load image via k3s agent images directory.
      # Images placed in /var/lib/rancher/k3s/agent/images/ are ingested and
      # tracked by the k3s agent itself — unlike k3s ctr import, the agent
      # keeps the named reference and does not GC it between steps.
      - name: Load image into k3s
        run: |
          ARCHIVE="/tmp/${{ env.IMAGE }}-${{ steps.meta.outputs.sha-tag }}.tar"
          # Embed the image reference in the OCI archive index.
          buildah push ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }} \
            oci-archive:${ARCHIVE}:${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }}
          # Copy into the agent-managed directory and wait for ingestion.
          sudo mkdir -p /var/lib/rancher/k3s/agent/images
          sudo cp ${ARCHIVE} /var/lib/rancher/k3s/agent/images/${{ env.IMAGE }}.tar
          rm -f ${ARCHIVE}
          echo "── waiting for k3s agent to ingest image ──"
          for i in $(seq 1 60); do
            if sudo k3s ctr images ls | grep -q "${{ steps.meta.outputs.sha-tag }}"; then
              echo "✓ Image available in k3s after ${i}s"
              break
            fi
            [ $i -eq 60 ] && echo "✗ Timed out waiting for image ingestion" && exit 1
            sleep 1
          done

      # Smoke test: run the binary and check it starts cleanly.
      - name: Smoke test
        run: |
          sudo k3s ctr run --rm \
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }} \
            smoke-${{ steps.meta.outputs.sha-tag }} \
            /cobalt-dingo 2>&1 | grep -q "cobalt-dingo" \
            && echo "✓ Smoke test passed" \
            || echo "⚠ Smoke test inconclusive (binary may not print on first run yet)"

  # ── 3. Deploy to k3s ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to staging (k3s)
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Apply manifests and update image
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          # Ensure namespace and base deployment exist (idempotent).
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          # Patch to the exact sha image built in this run.
          kubectl set image deployment/cobalt-dingo \
            cobalt-dingo=${{ env.IMAGE }}:${IMAGE_TAG} \
            --namespace cobalt-dingo

      # Validation: rollout completes within 120s.
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/cobalt-dingo \
            --namespace cobalt-dingo \
            --timeout=120s

      # Validation: running pod carries the expected image tag.
      - name: Confirm pod health
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          kubectl get pods -n cobalt-dingo \
            -l app=cobalt-dingo \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[*].spec.containers[0].image}' \
          | grep -q "${IMAGE_TAG}" \
          && echo "✓ Pod running new image" \
          || (echo "✗ Pod image mismatch" && exit 1)
