name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE: cobalt-dingo

jobs:
  # ── 1. Quality gate ─────────────────────────────────────────────────────────
  check:
    name: Lint / Test / Vet
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false   # self-hosted runner: Go cache persists on disk between runs

      # Verify pre-installed toolchain on koala runner.
      # Fail fast here rather than silently mid-run.
      - name: Verify toolchain
        run: |
          go version
          task --version
          govulncheck -version 2>&1 || true

      - name: Install golangci-lint
        run: |
          # Pin to v2 to match the config format used in this repo.
          # Overrides whatever version is pre-installed on the runner.
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4
          golangci-lint --version

      - name: Run checks
        run: task check

  # ── 2. Build image ──────────────────────────────────────────────────────────
  build:
    name: Build & Import
    needs: check
    runs-on: self-hosted
    # Only on main branch or semver tags — not on PRs.
    if: github.event_name != 'pull_request'
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive image tags
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "sha-tag=${SHA}" >> "$GITHUB_OUTPUT"
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            echo "version-tag=${REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push to local registry
        run: |
          REGISTRY="localhost:5000"
          REF="${REGISTRY}/${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }}"
          buildah build \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
            -t ${REF} \
            -t ${REGISTRY}/${{ env.IMAGE }}:latest \
            .
          buildah push --tls-verify=false ${REF}
          buildah push --tls-verify=false ${REGISTRY}/${{ env.IMAGE }}:latest
          # Tag semver if this is a release
          [[ -n "${{ steps.meta.outputs.version-tag }}" ]] && \
            buildah push --tls-verify=false \
              ${REF} \
              ${REGISTRY}/${{ env.IMAGE }}:${{ steps.meta.outputs.version-tag }} || true
          echo "✓ Image pushed to ${REF}"

      # Smoke test: pull from registry and run the binary briefly.
      - name: Smoke test
        run: |
          REGISTRY="localhost:5000"
          REF="${REGISTRY}/${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }}"
          CNAME="smoke-${{ steps.meta.outputs.sha-tag }}"
          sudo k3s ctr images pull --plain-http ${REF}
          # Run with a 5s timeout; binary is a long-running server so timeout is expected.
          OUTPUT=$(timeout 5 sudo k3s ctr run --rm ${REF} ${CNAME} /cobalt-dingo 2>&1 || true)
          sudo k3s ctr containers delete ${CNAME} 2>/dev/null || true
          echo "$OUTPUT" | grep -q "cobalt-dingo" \
            && echo "✓ Smoke test passed" \
            || echo "⚠ Smoke test inconclusive: $OUTPUT"

  # ── 3. Deploy to k3s ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to staging (k3s)
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Apply manifests and update image
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          # Ensure namespace and base deployment exist (idempotent).
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          # Patch to the exact sha image built in this run.
          kubectl set image deployment/cobalt-dingo \
            cobalt-dingo=localhost:5000/${{ env.IMAGE }}:${IMAGE_TAG} \
            --namespace cobalt-dingo

      # Validation: rollout completes within 120s.
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/cobalt-dingo \
            --namespace cobalt-dingo \
            --timeout=120s \
          || {
            echo "── pod status ──"
            kubectl get pods -n cobalt-dingo -o wide
            echo "── pod events ──"
            kubectl get events -n cobalt-dingo --sort-by='.lastTimestamp' | tail -20
            echo "── pod describe ──"
            kubectl describe pods -n cobalt-dingo -l app=cobalt-dingo | tail -40
            exit 1
          }

      # Validation: running pod carries the expected image tag.
      - name: Confirm pod health
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          kubectl get pods -n cobalt-dingo \
            -l app=cobalt-dingo \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[*].spec.containers[0].image}' \
          | grep -q "localhost:5000/${{ env.IMAGE }}:${IMAGE_TAG}" \
          && echo "✓ Pod running new image" \
          || (echo "✗ Pod image mismatch" && exit 1)

  # ── 4. E2E sandbox tests ─────────────────────────────────────────────────────
  e2e:
    name: E2E (Fortnox sandbox)
    needs: check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      # Write .env from secrets — never stored in the repo.
      - name: Write .env
        env:
          FORTNOX_CLIENT_ID: ${{ secrets.FORTNOX_CLIENT_ID }}
          FORTNOX_CLIENT_SECRET: ${{ secrets.FORTNOX_CLIENT_SECRET }}
          FORTNOX_INVOICE_INBOX: ${{ secrets.FORTNOX_INVOICE_INBOX }}
        run: |
          printf 'FORTNOX_CLIENT_ID=%s\n' "$FORTNOX_CLIENT_ID" > .env
          printf 'FORTNOX_CLIENT_SECRET=%s\n' "$FORTNOX_CLIENT_SECRET" >> .env
          printf 'FORTNOX_REDIRECT_URI=http://localhost:8080/callback\n' >> .env
          printf 'FORTNOX_SCOPES="supplierinvoice supplier payment bookkeeping invoice inbox customer currency settings"\n' >> .env
          printf 'FORTNOX_ENV=sandbox\n' >> .env
          printf 'FORTNOX_INVOICE_INBOX=%s\n' "$FORTNOX_INVOICE_INBOX" >> .env

      # Write token file — runner needs a valid refresh token to operate without
      # interactive OAuth2 login. The access_token will be refreshed at runtime.
      - name: Write token file
        env:
          FORTNOX_REFRESH_TOKEN: ${{ secrets.FORTNOX_REFRESH_TOKEN }}
        run: |
          printf '{"access_token":"","refresh_token":"%s","token_type":"bearer","expires_at":"2000-01-01T00:00:00Z"}\n' \
            "$FORTNOX_REFRESH_TOKEN" > .fortnox-tokens.json
          chmod 600 .fortnox-tokens.json

      # Reset sandbox to a known state before seeding.
      - name: Teardown E2E fixtures
        run: |
          set -a && source .env && set +a
          go run ./cmd/e2e-teardown

      # Seed test suppliers and booked invoices.
      - name: Seed E2E fixtures
        run: |
          set -a && source .env && set +a
          go run ./cmd/e2e-seed

      # Run acceptance tests against the seeded sandbox.
      # Data is intentionally left in place after the run for manual inspection.
      - name: Run acceptance tests
        run: |
          set -a && source .env && set +a
          go test -race -count=1 -timeout=120s ./internal/acceptance/...

  # ── 5. Mirror to GitHub ─────────────────────────────────────────────────────
  mirror:
    name: Mirror to GitHub
    needs: [deploy, e2e]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitHub
        env:
          GH_DEPLOY_KEY: ${{ secrets.GH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$GH_DEPLOY_KEY" > ~/.ssh/id_rsa_gh_mirror
          chmod 600 ~/.ssh/id_rsa_gh_mirror
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_rsa_gh_mirror -o IdentitiesOnly=yes" \
            git push git@github.com:mathiasb/cobalt-dingo.git HEAD:main
          rm ~/.ssh/id_rsa_gh_mirror
          echo "✓ Mirrored to GitHub"
